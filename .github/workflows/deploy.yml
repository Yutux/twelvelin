name: CI/CD — Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ─── Job 1 : Build & vérification ───────────────────────────────────────────
  build:
    name: 🔨 Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🔍 Vérification TypeScript
        run: npx tsc --noEmit

      - name: 🏗️ Build Next.js
        run: npm run build

  # ─── Job 2 : Preview (sur PR uniquement) ────────────────────────────────────
  deploy-preview:
    name: 🔍 Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🚀 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔗 Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build pour preview
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🌐 Deploy preview sur Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> $GITHUB_OUTPUT

      - name: 💬 Commenter la PR avec le lien preview
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview déployée\n\n**URL :** ${{ steps.deploy.outputs.preview_url }}\n\n> Mise à jour automatique à chaque commit sur cette PR.`
            })

  # ─── Job 3 : Production (sur push main uniquement) ──────────────────────────
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🚀 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔗 Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build pour production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🌐 Deploy production sur Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
